{% extends "testbase.html" %}

{% block content %}
    <h1>Quiz</h1>
    <p>number of questions is {{ num }}</p>
    <form action="/submit" method="POST">
    {% for q in questions %}
    <div>
        <p> Question {{loop.index}} {{ q.question }}</p> 
        <ul>
            <li> <input type="button" name="q.answers[0]"> {{ q.answers[0] }}</li>
            <li> <input type="button" name="q.answers[1]"> {{ q.answers[1] }}</li>
            <li> <input type="button" name="q.answers[2]"> {{ q.answers[2] }}</li>
            <li> <input type="button" name="q.answers[3]"> {{ q.answers[3] }}</li>
        </ul>
    </div>
    {% endfor %}
    <input type="submit" value="submit">
    </form>
{% endblock %}
