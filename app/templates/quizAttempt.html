{%extends "base.html"%}

{%block content%}

<div class="jumbotron" style="text-align: center; margin-top: 5%;">
    <h2>Title : {{quiz.quizName}}</h2>
    <h3>Description: {{quiz.quizDescription}} </h3>
    <p>Good luck, {{ current_user.username }}!<br>
    
        <br>
        <hr>
        <ul style="list-style-type:none; text-align: left;">

            <li>Questions:</li>
            <ul>
                {%for question in quiz.questions%}
                <li>Question: {{question}} </li>
                {%endfor%}
            </ul>
        
    </p>


</div>

{%endblock%}
