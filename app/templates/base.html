<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  {%if title%}
  <title> {{title}} </title>
  {%else%}
  <title>Quiz Webpage</title>
  {%endif%}

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>
  <style>
    .is-hidden {
      display: none;
    }

    .quizCreationHeader {
      margin-top: 5%;
      background-color: #007bff;
      padding: 5%;
      border-radius: 20px;
      color: white;
      box-shadow: 5px 5px 5px rgb(150, 150, 150);
    }

    input {
      background-color: #0061c9;
      border-radius: 5px;
      border: none;
      color: white;
    }

    select {
      background-color: #0061c9;
      background-image: none;
      border-radius: 5px;
      color: white;
      border: none;
      padding: 5px
    }

    select option {
      border-radius: 5px;
      color: white;
      border: none;
    }

    .subquestion {
      margin-top: 5%;
      background-color: #007bff;
      padding: 5%;
      border-radius: 20px;
      color: white;
      box-shadow: 5px 5px 5px rgb(150, 150, 150);
    }

    .bubble {
      margin-top: 5%;
      background-color: #007bff;
      padding: 5%;
      border-radius: 20px;
      color: white;
      box-shadow: 5px 5px 5px rgb(150, 150, 150);
    }

    .addQues {
      font-size: large;
      margin: 5%;
      text-align: center;
      background-color: #007bff;
      border-radius: 20px;
      color: white;
      box-shadow: 5px 5px 5px rgb(150, 150, 150);
      display: flex;
      justify-content: center;
      align-items: center;
      width: 200px;
      height: 40px;
    }

    .addQues:hover {
      color: white;
      text-decoration: none;
      background-color: #0063ce;
    }

    .remove {
      width: 200px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      float: right;
      background-color: white;
      border-radius: 20px;
      color: black;
    }

    .remove:hover {
      text-decoration: none;
      background-color: rgb(235, 235, 235);
      color: black;
    }

    .submitQuiz  {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 5%;
      font-size: larger;
      
    }

    .submitQuiz input {
      padding: 5px 20px 5px 20px;
      background-color: #007bff;
    }
    .submitQuiz input:hover {
      background-color: #0063ce;
    }

    .register input {
      padding: 5px 20px 5px 20px;
    }
  </style>
</head>

<body >
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <a class="navbar-brand" href="/index">CITS3403 Web Quiz<span class="sr-only">(current)</span></a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarText"
      aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarText">
      <ul class="navbar-nav">

        {% if current_user.is_anonymous%}

        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('login') }}">Login</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('register') }}">Sign Up</a>
        </li>

        {% else %}

        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('dash')}}">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/stats">Statistics</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('profile')}}">Profile</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
        </li>

        {% endif%}
      </ul>
    </div>
  </nav>

  <div class="container">
    {% block content %} {% endblock %}
  </div>
</body>
